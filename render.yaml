services:
  # 1. Backend Web Service
  - type: web
    name: portfolio-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # You will enter this in the Render Dashboard
      - key: FRONTEND_URL
        sync: false # Point this to your frontend URL after the frontend is deployed

  # 2. Frontend Static Site
  - type: web
    name: portfolio-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false # You will enter your backend URL (e.g., https://your-backend.onrender.com/api) here in the Dashboard
